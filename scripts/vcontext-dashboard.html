<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI OS Dashboard</title>
<style>
  :root, [data-theme="dark"] {
    --bg: #0d1117; --bg-card: #161b22; --border: #30363d; --bg-bar: #21262d;
    --text: #e6edf3; --text-muted: #8b949e; --text-dim: #6e7681;
    --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
    --badge-decision-bg: #1f6feb33; --badge-error-bg: #da363333;
    --badge-observation-bg: #23843233; --badge-conversation-bg: #9e6a0333; --badge-code-bg: #8b5cf633;
    --model-tag-bg: #1f6feb22; --model-tag-border: #1f6feb44;
    --btn-bg: #21262d; --btn-hover: #30363d;
  }
  [data-theme="light"] {
    --bg: #ffffff; --bg-card: #f6f8fa; --border: #d0d7de; --bg-bar: #e1e4e8;
    --text: #1f2328; --text-muted: #656d76; --text-dim: #8b949e;
    --accent: #0969da; --green: #1a7f37; --red: #cf222e; --yellow: #9a6700; --purple: #8250df;
    --badge-decision-bg: #ddf4ff; --badge-error-bg: #ffebe9;
    --badge-observation-bg: #dafbe1; --badge-conversation-bg: #fff8c5; --badge-code-bg: #fbefff;
    --model-tag-bg: #ddf4ff; --model-tag-border: #54aeff44;
    --btn-bg: #f3f4f6; --btn-hover: #e1e4e8;
  }
  @media (prefers-color-scheme: light) {
    [data-theme="system"] {
      --bg: #ffffff; --bg-card: #f6f8fa; --border: #d0d7de; --bg-bar: #e1e4e8;
      --text: #1f2328; --text-muted: #656d76; --text-dim: #8b949e;
      --accent: #0969da; --green: #1a7f37; --red: #cf222e; --yellow: #9a6700; --purple: #8250df;
      --badge-decision-bg: #ddf4ff; --badge-error-bg: #ffebe9;
      --badge-observation-bg: #dafbe1; --badge-conversation-bg: #fff8c5; --badge-code-bg: #fbefff;
      --model-tag-bg: #ddf4ff; --model-tag-border: #54aeff44;
      --btn-bg: #f3f4f6; --btn-hover: #e1e4e8;
    }
  }
  .theme-toggle { display: inline-flex; gap: 2px; margin-left: 12px; }
  .theme-toggle button { background: var(--btn-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 2px 8px; font-size: 11px; cursor: pointer; border-radius: 0; }
  .theme-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .theme-toggle button:last-child { border-radius: 0 4px 4px 0; }
  .theme-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h2 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .stat { font-size: 32px; font-weight: bold; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-decision { background: var(--badge-decision-bg); color: var(--accent); }
  .badge-error { background: var(--badge-error-bg); color: var(--red); }
  .badge-observation { background: var(--badge-observation-bg); color: var(--green); }
  .badge-conversation { background: var(--badge-conversation-bg); color: var(--yellow); }
  .badge-code { background: var(--badge-code-bg); color: var(--purple); }
  .bar { height: 8px; border-radius: 4px; background: var(--bg-bar); margin: 4px 0; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .entry { padding: 8px 0; border-bottom: 1px solid var(--bg-bar); font-size: 13px; }
  .entry:last-child { border: none; }
  .entry-time { color: var(--text-muted); font-size: 11px; }
  .btn { background: var(--btn-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn:hover { background: var(--btn-hover); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-green { background: var(--green); }
  .status-red { background: var(--red); }
  .status-yellow { background: var(--yellow); }
  header { max-width: 1400px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 20px; }
  header .meta { font-size: 12px; color: var(--text-muted); }
  .model-tag { display: inline-block; background: var(--model-tag-bg); border: 1px solid var(--model-tag-border); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
  .chart-bar { display: flex; align-items: center; margin: 4px 0; }
  .chart-bar .label { width: 120px; font-size: 12px; color: var(--text-muted); }
  .chart-bar .bar-fill { background: var(--accent); }
  .wide { grid-column: span 2; }
  @media (max-width: 768px) { .wide { grid-column: span 1; } }
</style>
</head>
<body>
<header>
  <h1>AI OS Dashboard <span style="font-size:12px;color:var(--text-muted);font-weight:normal;">v1.8.2</span></h1>
  <div class="meta">
    <span id="status-indicator"><span class="status-dot status-yellow"></span>Loading...</span>
    &nbsp;|&nbsp; <span id="live-indicator" style="color:var(--green);">Connecting...</span>
    &nbsp;|&nbsp; <span id="uptime"></span>
    <span class="theme-toggle">
      <button onclick="setTheme('light')" id="theme-light">Light</button>
      <button onclick="setTheme('system')" id="theme-system">System</button>
      <button onclick="setTheme('dark')" id="theme-dark">Dark</button>
    </span>
  </div>
</header>
<div class="grid">
  <!-- Health -->
  <div class="card">
    <h2>System Health</h2>
    <div id="health-content">Loading...</div>
  </div>

  <!-- Storage Tiers -->
  <div class="card">
    <h2>Storage Tiers</h2>
    <div id="tiers-content">Loading...</div>
  </div>

  <!-- AI Status -->
  <div class="card">
    <h2>Local AI (Ollama)</h2>
    <div id="ai-content">Loading...</div>
  </div>

  <!-- Quick Actions -->
  <div class="card">
    <h2>Quick Actions</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" onclick="confirmAction('Summarize Old', '24時間以上前のエントリをOllamaで1文に要約します。元データは消えません。', '/ai/summarize', 'POST')">Summarize Old</button>
      <button class="btn" onclick="confirmAction('Tier Migrate', '古いエントリをRAM→SSD→Cloudに移動します。RAM上の古いデータが整理されます。', '/tier/migrate', 'POST')">Tier Migrate</button>
      <button class="btn" onclick="refresh()">Refresh</button>
    </div>
    <div id="action-confirm" style="display:none;margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-bar);font-size:12px;">
      <div id="action-confirm-title" style="font-weight:bold;margin-bottom:4px;"></div>
      <div id="action-confirm-desc" style="color:var(--text-muted);margin-bottom:8px;"></div>
      <button class="btn" id="action-confirm-ok" style="margin-right:4px;">Execute</button>
      <button class="btn" onclick="document.getElementById('action-confirm').style.display='none'">Cancel</button>
    </div>
    <div id="action-result" style="margin-top:8px;font-size:12px;color:var(--text-muted);"></div>
  </div>

  <!-- Recent Entries -->
  <div class="card wide">
    <h2>Recent Entries</h2>
    <div id="recent-content">Loading...</div>
  </div>

  <!-- Activity Stats -->
  <div class="card wide">
    <h2>Sessions</h2>
    <div id="analytics-content">Loading...</div>
  </div>
</div>

<script>
const API = 'http://localhost:3150';
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue('--' + name).trim(); }

function setTheme(mode) {
  document.documentElement.setAttribute('data-theme', mode);
  localStorage.setItem('aios-theme', mode);
  document.querySelectorAll('.theme-toggle button').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('theme-' + mode);
  if (btn) btn.classList.add('active');
}
// Restore saved theme or default to system
(function() {
  var saved = localStorage.getItem('aios-theme') || 'system';
  setTheme(saved);
})();

async function fetchJson(path) {
  try {
    const r = await fetch(API + path);
    return await r.json();
  } catch { return null; }
}

function confirmAction(title, desc, path, method) {
  var box = document.getElementById('action-confirm');
  document.getElementById('action-confirm-title').textContent = title;
  document.getElementById('action-confirm-desc').textContent = desc;
  var okBtn = document.getElementById('action-confirm-ok');
  okBtn.onclick = function() {
    box.style.display = 'none';
    doAction(path, method);
  };
  box.style.display = 'block';
}

async function doAction(path, method) {
  const el = document.getElementById('action-result');
  el.textContent = 'Executing...';
  try {
    const r = await fetch(API + path, { method });
    const d = await r.json();
    el.textContent = JSON.stringify(d).slice(0, 200);
    refresh();
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

function badgeClass(type) {
  var map = {
    'tool-use': 'observation', 'pre-tool': 'observation',
    'user-prompt': 'conversation', 'session-end': 'conversation',
    'compact': 'conversation', 'pre-compact': 'conversation',
    'subagent-start': 'code', 'subagent-stop': 'code',
    'tool-error': 'error', 'notification': 'error',
    'permission-request': 'decision', 'permission-denied': 'error',
  };
  return 'badge badge-' + (map[type] || type || 'observation');
}

function summarizeContent(type, raw) {
  if (!raw) return '';
  try {
    var d = JSON.parse(raw);
    var session = (d.session_id || '').slice(0, 8);
    var tool = d.tool_name || '';
    var desc = d.description || '';
    var prompt = d.prompt || '';
    var input = d.tool_input || {};
    var output = d.tool_response || {};

    if (type === 'user-prompt') {
      return (prompt || d.content || d.message || raw).slice(0, 200);
    }
    if (type === 'tool-use' || type === 'pre-tool') {
      var inputStr = typeof input === 'string' ? input : (input.command || input.file_path || input.pattern || input.query || JSON.stringify(input)).slice(0, 120);
      var outputStr = '';
      if (type === 'tool-use' && output) {
        var o = typeof output === 'string' ? output : (output.stdout || output.content || '');
        if (o) outputStr = ' \u2192 ' + String(o).slice(0, 60).replace(/\\n/g, ' ');
      }
      return (tool || '?') + ': ' + inputStr + outputStr;
    }
    if (type === 'subagent-start' || type === 'subagent-stop') {
      return (d.subagent_type || d.agent_type || 'agent') + (desc ? ': ' + desc.slice(0, 100) : '');
    }
    if (type === 'session-end') return 'Session ended [' + session + ']';
    if (type === 'compact' || type === 'pre-compact') return 'Context compaction';
    if (type === 'tool-error') return (tool || 'Tool') + ' FAILED: ' + (typeof output === 'string' ? output : JSON.stringify(output)).slice(0, 120);
    if (type === 'permission-request') return tool + ' permission requested';
    if (type === 'permission-denied') return tool + ' permission denied';
    // Fallback: show first meaningful field
    return (tool || prompt || desc || JSON.stringify(d)).slice(0, 150);
  } catch(e) {
    return raw.slice(0, 150);
  }
}

function toJST(utcStr) {
  if (!utcStr) return '';
  try {
    const d = new Date(utcStr.replace(' ', 'T') + 'Z');
    return d.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return utcStr; }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function refresh() {
  // Health
  const health = await fetchJson('/health');
  if (health) {
    const si = document.getElementById('status-indicator');
    si.innerHTML = '<span class="status-dot status-' + (health.status === 'healthy' ? 'green' : 'red') + '"></span>' + escapeHtml(health.status);
    document.getElementById('uptime').textContent = 'Uptime: ' + Math.floor(health.uptime_seconds / 60) + 'm';
    document.getElementById('health-content').innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
        '<div><span class="status-dot status-' + (health.ram_disk ? 'green' : 'red') + '"></span>RAM Disk</div>' +
        '<div><span class="status-dot status-' + (health.database ? 'green' : 'red') + '"></span>Database</div>' +
        '<div><span class="status-dot status-' + (health.ssd_database ? 'green' : 'red') + '"></span>SSD DB</div>' +
        '<div><span class="status-dot status-' + (health.cloud_configured ? 'green' : 'yellow') + '"></span>Cloud</div>' +
        '<div><span class="status-dot status-' + (health.local_ai ? 'green' : 'yellow') + '"></span>Ollama: ' + escapeHtml(health.local_ai_model || 'off') + '</div>' +
        '<div><span class="status-dot status-green"></span>WS: ' + (health.ws_clients || 0) + ' clients</div>' +
      '</div>';
  }

  // Tiers + AI
  const tiers = await fetchJson('/tier/stats');
  const ai = await fetchJson('/ai/status');
  if (tiers) {
    const maxEntries = Math.max(tiers.ram.entries, tiers.ssd.entries, 1);
    var tiersHtml =
      '<div class="chart-bar"><span class="label">RAM (' + escapeHtml(tiers.ram.size) + ')</span><div class="bar" style="flex:1"><div class="bar-fill" style="width:' + (tiers.ram.entries / maxEntries * 100) + '%;background:var(--accent)"></div></div><span style="margin-left:8px;font-size:13px;">' + tiers.ram.entries + '</span></div>' +
      '<div class="chart-bar"><span class="label">SSD (' + escapeHtml(tiers.ssd.size) + ')</span><div class="bar" style="flex:1"><div class="bar-fill" style="width:' + (tiers.ssd.entries / maxEntries * 100) + '%;background:var(--green)"></div></div><span style="margin-left:8px;font-size:13px;">' + tiers.ssd.entries + '</span></div>' +
      '<div class="chart-bar"><span class="label">Cloud</span><div class="bar" style="flex:1"><div class="bar-fill" style="width:' + (tiers.cloud.entries > 0 ? tiers.cloud.entries / maxEntries * 100 : 0) + '%;background:var(--yellow)"></div></div><span style="margin-left:8px;font-size:13px;">' + (tiers.cloud.configured ? tiers.cloud.entries : 'stub') + '</span></div>';

    // Local AI status inline
    if (ai) {
      var embedCount = ai.embedding_count || 0;
      var totalCount = tiers.ram.entries || 1;
      var embedPct = Math.round(embedCount / totalCount * 100);
      tiersHtml += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--bg-bar);">';
      tiersHtml += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">LOCAL AI</div>';
      tiersHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;">';
      tiersHtml += '<div><span class="status-dot status-' + (ai.ollama_available ? 'green' : 'red') + '"></span>Ollama</div>';
      tiersHtml += '<div>' + (ai.preferred ? escapeHtml(ai.preferred.embed || '') : '') + '</div>';
      tiersHtml += '</div>';
      var remaining = totalCount - embedCount;
      tiersHtml += '<div class="chart-bar" style="margin-top:4px;"><span class="label">Embedding</span><div class="bar" style="flex:1"><div class="bar-fill" style="width:' + embedPct + '%;background:var(--purple)"></div></div><span style="margin-left:8px;font-size:13px;">' + embedCount + '/' + totalCount + ' (' + embedPct + '%)</span></div>';
      if (remaining > 0) tiersHtml += '<div style="font-size:11px;color:var(--yellow);margin-top:2px;">' + remaining + ' entries pending</div>';
      tiersHtml += '<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">' + (ai.models || []).map(function(m){ return escapeHtml(m); }).join(', ') + '</div>';
      tiersHtml += '</div>';
    }
    document.getElementById('tiers-content').innerHTML = tiersHtml;
  }

  // AI (standalone card — kept for feature detail)
  if (ai) {
    document.getElementById('ai-content').innerHTML =
      '<div style="margin-bottom:8px;">' + (ai.ollama_available ? '<span class="status-dot status-green"></span>Available' : '<span class="status-dot status-red"></span>Not available') + '</div>' +
      '<div>' + (ai.models || []).map(function(m) { return '<span class="model-tag">' + escapeHtml(m) + '</span>'; }).join('') + '</div>' +
      '<div style="margin-top:8px;font-size:12px;color:var(--text-muted);">' +
        Object.entries(ai.features || {}).map(function(pair) { return (pair[1] ? 'ON' : 'OFF') + ' ' + escapeHtml(pair[0]); }).join(' &nbsp; ') +
      '</div>';
  }

  // Recent
  const recent = await fetchJson('/recent?n=15');
  if (recent && recent.results) {
    document.getElementById('recent-content').innerHTML = recent.results.map(function(r) {
      var summary = summarizeContent(r.type, r.content);
      var parsed = {};
      try { parsed = JSON.parse(r.content); } catch {}
      var sessionId = parsed.session_id || '';
      var sessionShort = sessionId ? sessionId.slice(0, 8) : '';
      var cwd = parsed.cwd || '';
      var projectName = cwd ? cwd.split('/').filter(Boolean).pop() : '';
      var model = parsed.model || '';
      return '<div class="entry">' +
        '<span class="' + badgeClass(r.type) + '">' + escapeHtml(r.type) + '</span>' +
        (sessionShort ? '<span style="margin-left:6px;font-size:10px;color:var(--text-dim);font-family:monospace;" title="' + escapeHtml(sessionId) + '">' + sessionShort + '</span>' : '') +
        (projectName ? '<span style="margin-left:4px;font-size:10px;color:var(--accent);">' + escapeHtml(projectName) + '</span>' : '') +
        (model ? '<span style="margin-left:4px;font-size:10px;color:var(--purple);">' + escapeHtml(model) + '</span>' : '') +
        '<div style="margin-top:2px;">' + escapeHtml(summary) + '</div>' +
        '<div class="entry-time">' + toJST(r.created_at) + (r._tier ? ' | ' + escapeHtml(r._tier) : '') + '</div>' +
      '</div>';
    }).join('');
  }

  // Sessions — aggregate from recent entries
  const allRecent = await fetchJson('/recent?n=200');
  if (allRecent && allRecent.results) {
    var sessions = {};
    for (var i = 0; i < allRecent.results.length; i++) {
      var entry = allRecent.results[i];
      var parsed2 = {};
      try { parsed2 = JSON.parse(entry.content); } catch {}
      var sid = parsed2.session_id || entry.session || '';
      if (!sid) continue;
      if (!sessions[sid]) {
        sessions[sid] = { events: 0, types: {}, project: '', model: '', lastActive: entry.created_at, firstSeen: entry.created_at };
      }
      var s = sessions[sid];
      s.events++;
      s.types[entry.type] = (s.types[entry.type] || 0) + 1;
      s.firstSeen = entry.created_at;
      if (!s.project && parsed2.cwd) s.project = parsed2.cwd.split('/').filter(Boolean).pop();
      if (!s.model && parsed2.model) s.model = parsed2.model;
    }

    var sortedSessions = Object.entries(sessions).sort(function(a, b) {
      return (b[1].lastActive || '').localeCompare(a[1].lastActive || '');
    });

    function timeAgo(utcStr) {
      if (!utcStr) return '';
      try {
        var d = new Date(utcStr.replace(' ', 'T') + 'Z');
        var diff = Math.floor((Date.now() - d.getTime()) / 1000);
        if (diff < 60) return diff + 's ago';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
      } catch { return ''; }
    }

    var html = '<table style="width:100%;font-size:12px;border-collapse:collapse;">';
    html += '<tr style="color:var(--text-muted);text-align:left;"><th style="padding:4px;">Session</th><th>Project</th><th>Last Active</th><th>Events</th><th>Breakdown</th></tr>';
    for (var j = 0; j < Math.min(sortedSessions.length, 10); j++) {
      var sid2 = sortedSessions[j][0];
      var info = sortedSessions[j][1];
      var isEnded = info.types['session-end'] > 0;
      var rowColor = isEnded ? cssVar('text-dim') : cssVar('text');
      var statusDot = isEnded ? 'status-red' : 'status-green';
      var breakdown = Object.entries(info.types).map(function(p) { return p[0] + ':' + p[1]; }).join(' ');
      html += '<tr style="color:' + rowColor + ';border-top:1px solid var(--bg-bar);">';
      html += '<td style="padding:4px;font-family:monospace;"><span class="status-dot ' + statusDot + '"></span>' + escapeHtml(sid2.slice(0, 8)) + '</td>';
      html += '<td style="color:var(--accent);">' + escapeHtml(info.project || '-') + '</td>';
      html += '<td>' + timeAgo(info.lastActive) + '</td>';
      html += '<td>' + info.events + '</td>';
      html += '<td style="font-size:11px;color:var(--text-muted);">' + escapeHtml(breakdown) + '</td>';
      html += '</tr>';
    }
    html += '</table>';
    html += '<div style="margin-top:8px;font-size:11px;color:var(--text-dim);">' + sortedSessions.length + ' sessions total | <span class="status-dot status-green" style="margin-left:4px;"></span>active <span class="status-dot status-red" style="margin-left:8px;"></span>ended</div>';
    document.getElementById('analytics-content').innerHTML = html;
  } else {
    document.getElementById('analytics-content').innerHTML = '<div style="color:var(--text-muted);">No session data</div>';
  }
}

refresh();

// ── WebSocket real-time updates ───────────────────────────────
var ws = null;
var wsReconnectTimer = null;
var liveCount = 0;
var wsRetryDelay = 1000;
var wsConnected = false;

function setStatus(dot, text) {
  document.getElementById('status-indicator').innerHTML =
    '<span class="status-dot status-' + dot + '"></span>' + text;
}

function connectWs() {
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  setStatus('yellow', 'Connecting...');
  try {
    ws = new WebSocket('ws://localhost:3150/ws');
    ws.onopen = function() {
      wsConnected = true;
      wsRetryDelay = 1000;
      setStatus('green', 'LIVE');
      document.getElementById('live-indicator').textContent = 'Live: ' + liveCount + ' events';
      document.getElementById('live-indicator').style.color = cssVar('green');
      ws.send(JSON.stringify({ action: 'subscribe' }));
      startPolling();
      refresh();
    };
    ws.onmessage = function(e) {
      try {
        var data = JSON.parse(e.data);
        if (data.event === 'new_entry' || data.event === 'conflict_detected' || data.event === 'consultation_updated') {
          liveCount++;
          document.getElementById('live-indicator').textContent = 'Live: ' + liveCount + ' events';
          refresh();
        }
      } catch {}
    };
    ws.onclose = function() {
      wsConnected = false;
      setStatus('yellow', 'Reconnecting (' + Math.round(wsRetryDelay/1000) + 's)...');
      document.getElementById('live-indicator').textContent = 'WS disconnected';
      document.getElementById('live-indicator').style.color = cssVar('yellow');
      startPolling();
      wsReconnectTimer = setTimeout(connectWs, wsRetryDelay);
      wsRetryDelay = Math.min(wsRetryDelay * 1.5, 15000);
    };
    ws.onerror = function() { if (ws) ws.close(); };
  } catch {
    wsReconnectTimer = setTimeout(connectWs, wsRetryDelay);
    wsRetryDelay = Math.min(wsRetryDelay * 1.5, 15000);
  }
}

connectWs();

// Adaptive polling: fast when WS is down, slow when connected
var pollTimer = null;
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(refresh, wsConnected ? 30000 : 5000);
}
startPolling();
</script>
