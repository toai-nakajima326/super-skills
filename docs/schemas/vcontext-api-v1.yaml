  # ── CONSULT ─────────────────────────────────────────────────────
  /resolve:
    post:
      tags: [consult]
      operationId: resolveDecisions
      summary: Build resolution prompt + heuristic suggestions for conflicting decisions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                context: { type: string }
                candidates:
                  type: array
                  items: { type: integer }
      responses:
        '200':
          description: Resolution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflict: { type: boolean }
                  candidates:
                    type: array
                    items: { $ref: '#/components/schemas/Entry' }
                  resolution_prompt: { type: [string, "null"] }
                  suggestion:
                    type: [object, "null"]
                    properties:
                      by_recency: { type: object }
                      by_confidence: { type: object }
                      by_status: { type: object }
                      by_supersedes: { type: object }
                  note: { type: string }

  /consult:
    post:
      tags: [consult]
      operationId: createConsult
      summary: Create a multi-model consultation package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, models]
              properties:
                query: { type: string }
                context: { type: string }
                models:
                  type: array
                  items: { type: string, example: "claude" }
                candidates:
                  type: array
                  items: { type: integer }
      responses:
        '201':
          description: Consultation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  consultation_id: { type: string, example: "consult_1745123456789" }
                  packages:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        url: { type: string }
                        prompt: { type: string }
                        instructions: { type: string }
                  candidates:
                    type: array
                    items: { $ref: '#/components/schemas/Entry' }
                  status: { const: pending_responses }

