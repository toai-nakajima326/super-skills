                  patchId: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }
        '404':
          description: Patch not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Syntax test failed (rolled back) or git error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/reject-patch:
    post:
      tags: [admin]
      operationId: rejectPatch
      summary: Reject a pending patch
      security:
        - adminCsrf: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        '200':
          description: Rejected
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }

  /admin/adopt-idea:
    post:
      tags: [admin]
      operationId: adoptIdea
      summary: Mark a pending-idea as adopted and mirror to adopted-idea entry
      security:
        - adminCsrf: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        '200':
          description: Adopted
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }
        '404':
          description: Idea not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/reject-idea:
    post:
      tags: [admin]
      operationId: rejectIdea
      summary: Reject a pending-idea entry (dashboard Dismiss)
      security:
        - adminCsrf: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
      responses:
        '200':
          description: Rejected
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }

  /admin/replay-wal:
    post:
      tags: [admin]
      operationId: replayWal
      summary: Replay entries-wal.jsonl into entries (INSERT OR IGNORE, non-destructive)
      security:
        - adminCsrf: []
      responses:
        '200':
          description: Replay stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  inserted: { type: integer }
                  skipped: { type: integer }
                  failed: { type: integer }
                  wal_path: { type: string }
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }
        '404':
          description: No WAL file
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/health-report:
    get:
      tags: [admin]
      operationId: healthReport
      summary: Human-readable daily/weekly brief (used by morning-brief script)
      parameters:
        - in: query
          name: days
          schema: { type: integer, default: 1, minimum: 1, maximum: 30 }
      responses:
        '200':
          description: Brief
          content:
            application/json:
              schema:
                type: object
                properties:
                  period_days: { type: integer }
                  brief: { type: string }
                  stats:
                    type: object
                    properties:
                      events: { type: integer }
                      sessions: { type: integer }
                      errors: { type: integer }
                      skills: { type: integer }
                      decisions: { type: integer }
                      patches: { type: integer }
                  top_tools: { type: array }
                  slowest_ops: { type: array }

  /admin/rollback-last:
    post:
      tags: [admin]
      operationId: rollbackLast
      summary: Rollback last `self-improve` commit (git reset + reload)
      security:
        - adminCsrf: []
      responses:
        '200':
          description: Rolled back
          content:
            application/json:
              schema:
                type: object
                properties: { rolled_back: { const: true } }
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }
        '500':
          description: No self-improve commit found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/restart-aios:
    post:
      tags: [admin]
      operationId: restartAios
      summary: Soft-restart the server (SIGHUP to wrapper)
      security:
        - adminCsrf: []
      responses:
        '200':
          description: Restart initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  restarting: { const: true }
                  wrapper_pid: { type: integer }
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }
        '503':
          description: wrapper lock not found — cannot SIGHUP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/stop-aios:
    post:
      tags: [admin]
      operationId: stopAios
      summary: Hard-stop via launchctl disable + kill (requires confirm token)
      security:
        - adminCsrf: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  enum: ["yes"]
      responses:
        '200':
          description: Stop initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  stopped: { const: true }
                  restart_cmd: { type: string }
                  note: { type: string }
        '400':
          description: confirm:"yes" missing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403': { $ref: '#/components/responses/AdminCsrfRequired' }

  /admin/verify-backup:
    post:
      tags: [admin]
      operationId: verifyBackup
      summary: Integrity check of latest N snapshots
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked: { type: integer }
                  passed: { type: integer }
                  failed: { type: integer }
                  integrity: { type: string, enum: [ok, fail] }
                  latest: { type: string }
                  alerts: { type: array, items: { type: string } }
                  snapshots: { type: array, items: { type: object } }
                  verified_at: { type: string }
        '404':
          description: No snapshots found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/trigger-l2-summary:
    post:
      tags: [admin]
      operationId: triggerL2Summary
      summary: Force-generate an L2 daily chunk summary (fire-and-forget)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
      responses:
        '202':
          description: Triggered
          content:
            application/json:
              schema: { type: object }
        '503':
          description: MLX generate unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/trigger-l3-summary:
    post:
      tags: [admin]
      operationId: triggerL3Summary
      summary: Force-generate an L3 weekly chunk summary (fire-and-forget)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                week:
                  type: string
                  pattern: '^\d{4}-W\d{2}$'
                  example: "2026-W16"
      responses:
        '202':
          description: Triggered
          content:
            application/json:
              schema: { type: object }
        '503':
          description: MLX generate unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/run-all:
    post:
      tags: [admin]
      operationId: runAll
      summary: Fire AI-driven loops sequentially (discovery, prediction, auto-create-skill)
      responses:
        '202':
          description: Triggered
          content:
            application/json:
              schema: { type: object }

  /admin/fts-rebuild:
    post:
      tags: [admin]
      operationId: ftsRebuild
      summary: FTS5 incremental rebuild
      responses:
        '200':
          description: Rebuilt

  /admin/fts-full-rebuild:
    post:
      tags: [admin]
      operationId: ftsFullRebuild
      summary: Nuclear FTS rebuild (drop + recreate + reindex, hard-delete migrated rows)
      responses:
        '200':
          description: Full rebuild result
          content:
            application/json:
              schema:
                type: object
                properties:
                  dropped: { type: boolean }
                  recreated: { type: boolean }
                  reindexed: { type: integer }
                  cleaned: { type: integer }
                  error: { type: [string, "null"] }

  /admin/fts-hard-cleanup:
    post:
      tags: [admin]
      operationId: ftsHardCleanup
      summary: Hard-delete soft-migrated rows (after FTS rebuild)
      responses:
        '200':
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
                  failed: { type: integer }

  /admin/dedup-ssd:
    post:
      tags: [admin]
      operationId: dedupSsd
      summary: Focused SSD content-hash dedup (MIN(id) per (type, hash))
      responses:
        '200':
          description: Dedup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
                  schema_fixed: { type: integer }
                  vacuumed: { type: boolean }
                  indexed: { type: boolean }
                  error: { type: [string, "null"] }

  /admin/dedup-migration:
    post:
      tags: [admin]
      operationId: dedupMigration
      summary: One-shot dedup migration (add column, backfill, delete dupes, unique index)
      responses:
        '200':
          description: Migration result
          content:
            application/json:
              schema:
                type: object
                properties:
                  added_column: { type: boolean }
                  backfilled: { type: integer }
                  deleted: { type: integer }
                  index_created: { type: boolean }
                  ssd_schema_fixed: { type: integer }
                  ssd_backfilled: { type: integer }
                  ssd_deleted: { type: integer }
                  ssd_error: { type: string }
                  error: { type: [string, "null"] }

  /admin/wipe-user:
    post:
      tags: [admin]
      operationId: wipeUser
      summary: Compliance wipe — delete all entries tagged `user:<id>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string }
      responses:
        '200':
          description: Wipe counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  ram_deleted: { type: integer }
                  ssd_deleted: { type: integer }
                  userId: { type: string }

  /admin/vote:
    post:
      tags: [admin]
      operationId: adminVote
      summary: Consensus sampling — N MLX generations, majority wins
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                samples: { type: integer, default: 3, minimum: 2, maximum: 5 }
      responses:
        '200':
          description: Sampled consensus
          content:
            application/json:
              schema:
                type: object
                properties:
                  samples: { type: integer }
                  consensus: { type: [string, "null"] }
                  confidence: { type: number }
                  all_responses:
                    type: array
                    items: { type: string }

  /admin/multi-role-check:
    post:
      tags: [admin]
      operationId: multiRoleCheck
      summary: Parallel QA / architect / UX / security / holistic / meta checks
      responses:
        '200':
          description: Findings across 6 role perspectives
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: object
                    additionalProperties: true
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        role: { type: string }
                        msg: { type: string }
                  checked_at: { type: string }

  /admin/mlx-test:
    post:
      tags: [admin]
      operationId: mlxTest
      summary: Deterministic MLX generation with a seed (repro / debug)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                seed: { type: integer }
      responses:
        '200':
          description: Generation
          content:
            application/json:
              schema:
                type: object
                properties:
                  content: { type: string }
                  seed: { type: integer }

  /admin/task-request:
    post:
      tags: [admin]
      operationId: taskRequest
      summary: Enqueue an AIOS task-queue job (survives Claude Code crashes)
      description: |
        Allowed task types: `locomo-eval`, `skill-discovery-adhoc`,
        `article-scan-adhoc`, `self-evolve-dryrun`, `shell-command`.
        `shell-command` additionally requires `X-Vcontext-Admin: yes`
        header AND `payload.approved_by_user === true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_type]
              properties:
                task_type:
                  type: string
                  enum:
                    - locomo-eval
                    - skill-discovery-adhoc
                    - article-scan-adhoc
                    - self-evolve-dryrun
                    - shell-command
                payload: { type: object }
                priority:
                  type: integer
                  enum: [1, 2, 3]
                  default: 2
                requested_by:
                  type: string
                  maxLength: 120
      responses:
        '200':
          description: Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id: { type: string, format: uuid }
                  status: { const: pending }
                  queue_position: { type: integer }
                  created_at: { type: string, format: date-time }
        '400':
          description: Unknown task_type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: shell-command task without admin header or approval
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /admin/task-queue:
    get:
      tags: [admin]
      operationId: taskQueueSnapshot
      summary: Pending + running + recent-results snapshot
      responses:
        '200':
          description: Queue snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: array
                    items: { type: object }
                  running:
                    type: array
                    items: { type: object }
                  recent_results:
                    type: array
                    items: { type: object }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "vctx_<64-hex>"
      description: |
        API key in `Authorization: Bearer vctx_<hex>` form. Loopback
        calls (127.0.0.1 / ::1) skip this when `VCONTEXT_BIND` is the
        default 127.0.0.1; LAN calls always require it.
    adminCsrf:
      type: apiKey
      in: header
      name: X-Vcontext-Admin
      description: |
        CSRF mitigation for destructive admin endpoints. Must equal the
        literal string `yes`. Defense-in-depth: combines with
        `bearerAuth` + application-level role check when applicable.

  responses:
    BadRequest:
      description: Missing / invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing / invalid API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Role / group does not permit this action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    AdminCsrfRequired:
      description: "Missing `X-Vcontext-Admin: yes` header"
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
      examples:
        - error: "Missing required fields: type, content"

    Role:
      type: string
      enum: [viewer, member, admin, owner]
      description: |
        Hierarchical. Level ordering: viewer < member < admin < owner.
        - viewer: read-only (cannot POST /store)
        - member: read/write in own groups
        - admin: + create/update keys within own groups
        - owner: + create groups, export, assign admin/owner roles

    Confidence:
      type: string
      enum: [high, medium, low]

    StoreRequest:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          description: Entry type (e.g. decision, tool-call, skill-usage)
        content:
          type: string
          description: Arbitrary payload (JSON-stringified or plain text)
        tags:
          type: array
          items: { type: string }
          description: Auto-augmented with `user:<id>` and optional `project:<ns>`/`group:<g>`
        session:
          type: string
        namespace:
          type: string
          description: Injected as `project:<namespace>` tag
        group:
          type: string
          description: "Target group (non-owner must be a member)"
        reasoning:
          type: string
          nullable: true
        conditions:
          type: string
          nullable: true
        supersedes:
          type: integer
          nullable: true
          description: Entry id that this replaces
        confidence:
          $ref: '#/components/schemas/Confidence'
        status:
          type: string
          enum: [active, deprecated, temporary, experimental]
          default: active
        parent_id:
          type: integer
          nullable: true
          description: Causal parent — used by /trace/:id

    Entry:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        content: { type: string }
        tags:
          oneOf:
            - type: string
              description: "Serialized JSON array (pre-parseTags())"
            - type: array
              items: { type: string }
              description: "Parsed array (post-parseTags())"
        session: { type: [string, "null"] }
        token_estimate: { type: integer }
        created_at: { type: string }
        last_accessed: { type: string }
        access_count: { type: integer }
        tier:
          type: string
          enum: [ram, ssd, cloud]
        reasoning: { type: [string, "null"] }
        conditions: { type: [string, "null"] }
        supersedes: { type: [integer, "null"] }
        confidence: { $ref: '#/components/schemas/Confidence' }
        status: { type: string }
        content_hash: { type: [string, "null"] }
        parent_id: { type: [integer, "null"] }
        embedding:
          type: [string, "null"]
          description: "JSON-stringified float array (omitted when short=1)"
        _tier:
          type: string
          enum: [ram, ssd, cloud]
          description: "Tier the entry was served from (set at read time)"
        _semantic:
          type: boolean
          description: "true when result came from semantic boost"
        _warning:
          type: string
          description: "DB size / quota warning appended to /store response"
        _conflicts:
          type: object
          description: "Conflict hint appended to /store for type=decision"

    TraceNode:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        session: { type: [string, "null"] }
        parent_id: { type: [integer, "null"] }
        created_at: { type: string }
        preview: { type: string }

    HealthReport:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        ram_disk: { type: boolean }
        use_ramdisk: { type: boolean }
        database: { type: boolean }
        ssd_database: { type: boolean }
        cloud_configured: { type: boolean }
        mlx_generate_available: { type: boolean }
        mlx_generate_model: { type: [string, "null"] }
        mlx_available: { type: boolean }
        ws_clients: { type: integer }
        uptime_seconds: { type: integer }
        features:
          type: object
          properties:
            semantic_search: { type: boolean }
            mlx_embed: { type: boolean }
            usage_analytics: { type: boolean }

    TierSnapshot:
      type: object
      properties:
        entries: { type: integer }
        size: { type: string }
        oldest: { type: [string, "null"] }
        newest: { type: [string, "null"] }

# ────────────────────────────────────────────────────────────────
# WebSocket appendix (not part of the HTTP paths above).
# AsyncAPI would be the proper format; keeping this as an extension
# so the OpenAPI spec stays machine-readable.
# ────────────────────────────────────────────────────────────────
x-aios-websocket:
  endpoint: /ws
  upgrade: "HTTP/1.1 Upgrade: websocket"
  auth: |
    Optional `?key=<vctx_...>` query parameter. Without it, loopback
    callers auth as owner (same logic as HTTP loopback).
  client_to_server:
    - action: subscribe
      params:
        namespace: { type: string, description: "subscribe to ns:<name>" }
        type: { type: string, description: "subscribe to type:<name>" }
      example: { action: subscribe, namespace: chatai }
    - action: unsubscribe
      params:
        namespace: { type: string }
        type: { type: string }
    - action: ping
      example: { action: ping }
  server_to_client:
    - event: connected
      fields: [clientId, userId]
    - event: subscribed
      fields: [subscriptions]
    - event: unsubscribed
      fields: [subscriptions]
    - event: pong
      fields: [ts]
    - event: new_entry
      description: Broadcast on /store; payload is the stored Entry (content truncated to 200 chars)
    - event: conflict_detected
      description: When a decision POST produced _conflicts metadata
    - event: consultation_request
      fields: [consultation_id, query, candidate_count, prompt]
    - event: consultation_updated
      fields: [consultation_id, status, consensus, local_response]
  notes: |
    Broadcast obeys group access rules — clients only see entries their
    group membership allows. Subscriptions filter by namespace or type;
    `all` (default) receives everything the group rules permit.

x-aios-rate-limits:
  body_max_bytes: 10485760
  body_max_bytes_note: "10 MiB hard limit enforced in readBody(); exceeding → 400 'body > N bytes'"
  dashboard_cache: "none (Cache-Control: no-cache, must-revalidate)"
  weekly_summary_cache_ttl_s: 30
  mlx_file_lock: "/tmp/aios-mlx-lock coordinates MLX access across processes"

x-aios-deprecations:
  none_found:
    description: |
      A grep of the current scripts/vcontext-server.js did not surface
      `TODO deprecate` or `LEGACY:` markers on any active endpoint.
      Endpoints that are functionally stubs (e.g. /tier/config saves but
      never syncs, /federation/route still routes 100% to local MLX) are
      documented with `_note` fields in their responses but are not
      deprecated per se.

x-aios-experimental:
  federation_route:
    path: /federation/route
    reason: "external_url + external_api_key path is a stub; always routes to local MLX today"
  tier_config:
    path: /tier/config
    reason: "Cloud provider config is persisted but cloudStore.search/recent are stubs"
