openapi: 3.1.0
info:
  title: vcontext HTTP API
  version: 1.0.0
  summary: The inter-process contract for AIOS' memory, search, auth, consultation, and admin surface.
  description: |
    vcontext is the HTTP layer of AIOS — the AI-native operating system's
    cognitive substrate. This spec is the source of truth for every
    client (Claude Code hooks, Codex, article-scanner, dashboard,
    self-evolve loops, future external agents).

    **Constitutional alignment** — this spec exists because:
    - P2 (Contract-first over language-first): the JSON shapes here
      are the substrate. Languages are interchangeable.
    - P4 (Machine-readable logs / metrics / contracts): every endpoint
      must be describable to an LLM reading this file.

    **Authentication model** — the server binds to 127.0.0.1 by default,
    so a local caller is treated as `owner` with wildcard group access
    (no Authorization header required). When `VCONTEXT_BIND=0.0.0.0`
    is set for LAN exposure, all non-loopback calls require
    `Authorization: Bearer vctx_<hex>` except for `/dashboard` and
    `/auth/whoami`.

    **Destructive admin actions** additionally require the CSRF-mitigation
    header `X-Vcontext-Admin: yes`. See the `adminCsrf` securityScheme.

    **Errors** — all failures return a JSON body matching
    `#/components/schemas/ErrorResponse` (just `{ error: "<message>" }`).
    Body > 10 MiB is rejected as 400 before any handler runs.

    **Source of truth** — `scripts/vcontext-server.js`. Regenerate this
    file via the process described in `docs/schemas/README.md`.
  contact:
    name: AIOS / vcontext
    url: https://github.com/toai-nakajima/skills
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://127.0.0.1:3150
    description: Loopback default (local AI callers auto-auth as owner)
  - url: http://{host}:{port}
    description: LAN binding when VCONTEXT_BIND=0.0.0.0
    variables:
      host:
        default: 192.168.0.10
      port:
        default: "3150"

tags:
  - name: entries
    description: Core memory substrate — store / recall / recent / session / trace.
  - name: search
    description: Semantic and predictive search over the entry corpus.
  - name: auth
    description: API keys, groups, role hierarchy (owner > admin > member > viewer).
  - name: consult
    description: Multi-model consultation protocol for decision conflict resolution.
  - name: health
    description: Liveness + pipeline heartbeats + loop status.
  - name: metrics
    description: API / cost / analytics / skill-effectiveness metrics.
  - name: tier
    description: RAM / SSD / Cloud tier management.
  - name: export
    description: Portable NDJSON dumps for backup and migration.
  - name: admin
    description: Destructive / elevated operations (CSRF-gated).
  - name: dashboard
    description: Browser UI + dashboard-support JSON endpoints.
  - name: federation
    description: Cross-tier AI routing (local MLX + optional external).
  - name: otel
    description: OpenTelemetry / Langfuse tracing diagnostics.

security:
  # Loopback callers pass with no key. LAN callers MUST send bearerAuth.
  - {}
  - bearerAuth: []

paths:
  # ── ENTRIES ─────────────────────────────────────────────────────
  /store:
    post:
      tags: [entries]
      operationId: storeEntry
      summary: Store a context entry
      description: |
        Persists an entry to the RAM tier and async-mirrors to SSD + WAL.
        If `MLX_GENERATE` is available and content > 200 chars, an
        auto-summary populates `reasoning` in the background. Embedding
        is generated async if MLX embed is available.

        Dedup: identical `(session, type, content_hash)` triples are
        rejected via UNIQUE index. Skipped types (no dedup):
        `test`, `working-state`, `session-recall`, `anomaly-alert`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRequest'
            examples:
              decision:
                summary: A decision entry
                value:
                  type: decision
                  content: "Use MLX for embeddings, not external API"
                  tags: ["architecture", "mlx"]
                  session: "claude-2026-04-20-abc123"
                  confidence: high
                  status: active
              tool-call:
                summary: A tool-call log from a Claude hook
                value:
                  type: tool-call
                  content: "Read /Users/x/file.js offset=100 limit=50"
                  session: "claude-2026-04-20-abc123"
                  tags: ["tool:Read"]
                  parent_id: 12345
      responses:
        '201':
          description: Entry stored
          content:
            application/json:
              schema:
                type: object
                required: [stored]
                properties:
                  stored:
                    $ref: '#/components/schemas/Entry'
        '200':
          description: Deduplicated (entry with same content_hash already exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { const: true }
                  deduped: { const: true }
                  existing_id: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Viewer role, or group not accessible
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '507':
          description: DB size over limit
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /recall:
    get:
      tags: [entries]
      operationId: recallEntries
      summary: Full-text search across tiers
      description: |
        FTS5-ranked search across RAM → SSD → Cloud tiers with cross-tier
        dedup. Optional semantic boost via MLX embed when FTS returns
        fewer than `limit` results. Auto-promotes SSD/cloud hits to RAM.

        Context budget: pass `budget=<tokens>` to receive only the top-N
        by composite score (freshness × 0.3 + tier × 0.2 + access-recency
        × 0.2 + length-penalty × 0.3) within that token ceiling.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
          description: Query string (FTS5 syntax supported)
        - in: query
          name: limit
          schema: { type: integer, default: 10, maximum: 100 }
        - in: query
          name: type
          schema: { type: string }
          description: Restrict to a single entry type
        - in: query
          name: namespace
          schema: { type: string }
          description: Filter by `project:<namespace>` tag
        - in: query
          name: user
          schema: { type: string }
          description: Filter by `user:<id>` tag (pass `my=true` for caller's own)
        - in: query
          name: my
          schema: { type: string, enum: ["true", "false"] }
        - in: query
          name: semantic
          schema: { type: string, enum: ["true", "false"], default: "true" }
          description: Set `false` to skip the semantic boost fallback
        - in: query
          name: budget
          schema: { type: integer }
          description: Token budget — when > 0, results are score-ranked and truncated
        - in: query
          name: task_kind
          schema: { type: string }
          description: Caller-supplied tag for /metrics/report breakdowns (e.g. `session-recall`)
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [results, count, query]
                properties:
                  results:
                    type: array
                    items: { $ref: '#/components/schemas/Entry' }
                  count: { type: integer }
                  query: { type: string }
                  budget: { type: integer }
                  used_tokens: { type: integer }
                  dropped: { type: integer }
              examples:
                hit:
                  value:
                    results:
                      - id: 12345
                        type: decision
                        content: "Use MLX for embeddings"
                        tags: ["architecture", "mlx"]
                        created_at: "2026-04-18 11:22:33"
                        _tier: ram
                    count: 1
                    query: "mlx embeddings"
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /recent:
    get:
      tags: [entries]
      operationId: recentEntries
      summary: Most-recent entries (cascading tiers)
      parameters:
        - in: query
          name: n
          schema: { type: integer, default: 20, maximum: 200 }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: namespace
          schema: { type: string }
        - in: query
          name: short
          schema: { type: string, enum: ["0", "1"] }
          description: Truncate content to 500 chars, strip embedding
        - in: query
          name: task_kind
          schema: { type: string }
      responses:
        '200':
          description: Recent entries
          content:
            application/json:
              schema:
                type: object
                required: [results, count]
                properties:
                  results:
                    type: array
                    items: { $ref: '#/components/schemas/Entry' }
                  count: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /session/{id}:
    get:
      tags: [entries]
      operationId: getSession
      summary: Paginated entries for a session
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Session identifier
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: type
          schema: { type: string }
      responses:
        '200':
          description: Session page
          content:
            application/json:
              schema:
                type: object
                required: [session, results, count, total, limit, offset, has_more]
                properties:
                  session: { type: string }
                  results:
                    type: array
                    items: { $ref: '#/components/schemas/Entry' }
                  count: { type: integer }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
                  has_more: { type: boolean }
              examples:
                typical:
                  value:
                    session: "claude-2026-04-20-abc123"
                    results: []
                    count: 0
                    total: 0
                    limit: 100
                    offset: 0
                    has_more: false
        '400': { $ref: '#/components/responses/BadRequest' }

  /summarize:
    post:
      tags: [entries]
      operationId: compactEntries
      summary: Compact entries older than 24 h into per-type summaries
      description: |
        For each type with ≥3 entries older than 24 h, builds a `[Summary
        of N T entries]` entry and deletes the originals. Synchronous.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Compaction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  compacted: { type: integer }
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string }
                        compacted: { type: integer }

  /prune:
    delete:
      tags: [entries]
      operationId: pruneEntries
      summary: Delete entries older than a duration
      parameters:
        - in: query
          name: older_than
          schema: { type: string, default: "7d", pattern: '^\d+[dhm]$' }
          description: "Duration like `7d`, `24h`, `30m`"
      responses:
        '200':
          description: Prune result
          content:
            application/json:
              schema:
                type: object
                properties:
                  pruned: { type: integer }
                  ssd_pruned: { type: integer }
                  older_than: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /trace/{id}:
    get:
      tags: [entries]
      operationId: traceEntry
      summary: Walk causal ancestry + immediate children (Pillar 3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Ancestry chain
          content:
            application/json:
              schema:
                type: object
                required: [id, found, depth, ancestry, children]
                properties:
                  id: { type: integer }
                  found: { type: boolean }
                  depth: { type: integer }
                  truncated: { type: boolean }
                  ancestry:
                    type: array
                    items: { $ref: '#/components/schemas/TraceNode' }
                  children:
                    type: array
                    items: { $ref: '#/components/schemas/TraceNode' }
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  found: { const: false }

  /feed:
    get:
      tags: [entries]
      operationId: feedSince
      summary: Activity feed since timestamp, optionally excluding a user
      parameters:
        - in: query
          name: since
          required: true
          schema: { type: string }
          description: ISO timestamp (or SQLite-parseable `YYYY-MM-DD HH:MM:SS`)
        - in: query
          name: exclude_user
          schema: { type: string }
      responses:
        '200':
          description: Feed entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, count, since, latest]
                properties:
                  entries:
                    type: array
                    items: { $ref: '#/components/schemas/Entry' }
                  count: { type: integer }
                  since: { type: string }
                  latest: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /summaries:
    get:
      tags: [entries]
      operationId: hierarchicalSummaries
      summary: Hierarchical chunk summaries (L1 10-min / L2 daily / L3 weekly)
      parameters:
        - in: query
          name: level
          schema: { type: integer, default: 1, enum: [1, 2, 3] }
        - in: query
          name: hours
          schema: { type: integer, default: 24, maximum: 720 }
          description: For level=1 (max 30d)
        - in: query
          name: days
          schema: { type: integer, default: 30, maximum: 365 }
          description: For level=2
        - in: query
          name: weeks
          schema: { type: integer, default: 12, maximum: 104 }
          description: For level=3
      responses:
        '200':
          description: Summaries window
          content:
            application/json:
              schema:
                type: object
                properties:
                  level: { type: integer }
                  count: { type: integer }
                  expected_chunks: { type: integer }
                  coverage: { type: number }
                  summaries:
                    type: array
                    items: { type: object }

  /sessions/summary:
    get:
      tags: [entries]
      operationId: sessionSummaries
      summary: Per-session aggregates for the dashboard
      parameters:
        - in: query
          name: hours
          schema: { type: integer, default: 24, maximum: 168 }
      responses:
        '200':
          description: Session aggregates
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      properties:
                        session: { type: string }
                        events: { type: integer }
                        first_seen: { type: string }
                        last_active: { type: string }
                        types:
                          type: object
                          additionalProperties: { type: integer }
                        project: { type: string }
                  count: { type: integer }
                  period_hours: { type: integer }

  # ── SEARCH ──────────────────────────────────────────────────────
  /search/semantic:
    get:
      tags: [search]
      operationId: semanticSearch
      summary: Vector similarity search via MLX embeddings
      description: |
        Uses sqlite-vec index when available; falls back to JS cosine over
        all `embedding IS NOT NULL` rows. If MLX is unreachable or its
        dimension differs from stored embeddings, falls back to FTS.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 10, maximum: 50 }
        - in: query
          name: threshold
          schema: { type: number, default: 0.5 }
        - in: query
          name: type
          schema: { type: string }
          description: Restrict to a type (triggers type-scoped JS cosine path)
      responses:
        '200':
          description: Ranked matches
          content:
            application/json:
              schema:
                type: object
                required: [results, count, engine]
                properties:
                  results:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Entry'
                        - type: object
                          properties:
                            similarity: { type: number }
                            _engine:
                              type: string
                              enum: [sqlite-vec, js-cosine, type-scoped, fts-fallback]
                  count: { type: integer }
                  engine:
                    type: string
                    enum: [sqlite-vec, js-cosine, type-scoped, fts-fallback]
                  model_used:
                    type: [string, "null"]
                  embed_source:
                    type: [string, "null"]
                  threshold: { type: number }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /predictive-search:
    post:
      tags: [search]
      operationId: predictiveSearch
      summary: Fire-and-forget predictive background search
      description: |
        Extracts keywords from a prompt via MLX generate, sanitizes for
        privacy (PATH/URL/EMAIL/TOKEN/IP redaction), then searches
        vcontext FTS + SearXNG + MLX knowledge + Wikipedia in parallel.
        Results are stored as a `predictive-search` entry for later
        `/recall`. Returns 202 immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string, minLength: 10 }
                session: { type: string }
      responses:
        '200':
          description: Skipped (prompt too short or MLX unavailable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { const: skipped }
                  reason: { type: string }
        '202':
          description: Search running in background
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { const: searching }
                  prompt_length: { type: integer }

  /predict/next:
    get:
      tags: [search]
      operationId: predictNext
      summary: Pure-SQL ranked next-likely tools / skills / gaps (Pillar 4)
      parameters:
        - in: query
          name: session
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 5, maximum: 20 }
      responses:
        '200':
          description: Predictions
          content:
            application/json:
              schema:
                type: object
                required: [generated_at, signals, predictions]
                properties:
                  generated_at: { type: string, format: date-time }
                  signals:
                    type: object
                    properties:
                      last_tool: { type: [string, "null"] }
                      active_gap_count: { type: integer }
                      top_skills:
                        type: array
                        items:
                          type: object
                          properties:
                            name: { type: string }
                            count: { type: integer }
                  predictions:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:
                          type: string
                          enum: [tool, skill, gap, suggestion]
                        label: { type: string }
                        score: { type: number }
                        reason: { type: string }
                        parent_id: { type: integer }

  /completion-check:
    post:
      tags: [search]
      operationId: completionCheck
      summary: Detect completion claims and run MLX-backed QA checklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assistant_message]
              properties:
                assistant_message: { type: string }
                session: { type: string }
      responses:
        '200':
          description: No completion claim detected (or MLX unavailable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked: { type: boolean }
                  analyzing: { type: boolean }
                  reason: { type: string }
        '202':
          description: Analysis running in background
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked: { const: true }
                  analyzing: { const: true }

  # ── HEALTH / STATUS ─────────────────────────────────────────────
  /health:
    get:
      tags: [health]
      operationId: health
      summary: Liveness probe
      description: |
        Returns 200 `healthy` or 503 `degraded`. In SSD-only mode the
        absence of `/Volumes/VContext` is expected, not a fault.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }
              examples:
                ssd-mode:
                  value:
                    status: healthy
                    ram_disk: false
                    use_ramdisk: false
                    database: true
                    ssd_database: true
                    cloud_configured: false
                    mlx_generate_available: true
                    mlx_generate_model: qwen3-14b
                    mlx_available: true
                    ws_clients: 2
                    uptime_seconds: 42315
                    features:
                      semantic_search: true
                      mlx_embed: true
                      usage_analytics: true
        '503':
          description: Degraded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }

  /pipeline/health:
    get:
      tags: [health]
      operationId: pipelineHealth
      summary: Per-feature heartbeat + loop status
      responses:
        '200':
          description: Pipeline health snapshot
          content:
            application/json:
              schema:
                type: object
                required: [summary, features, loops]
                properties:
                  summary:
                    type: object
                    properties:
                      green: { type: integer }
                      yellow: { type: integer }
                      red: { type: integer }
                      idle: { type: integer }
                  features:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }
                        last: { type: [string, "null"] }
                        age_min: { type: [integer, "null"] }
                        total: { type: integer }
                        today: { type: integer }
                        status:
                          type: string
                          enum: [green, yellow, red, idle]
                        condition: { type: boolean }
                  loops:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        running: { type: boolean }
                        last_tick_ms_ago: { type: [integer, "null"] }
                        iterations: { type: integer }
                        status:
                          type: string
                          enum: [green, yellow, red, stopped]

  /ai/status:
    get:
      tags: [health]
      operationId: aiStatus
      summary: Local AI (MLX) availability + embedding backlog
      responses:
        '200':
          description: Local AI status
          content:
            application/json:
              schema:
                type: object
                properties:
                  mlx_generate_available: { type: boolean }
                  mlx_generate_url: { type: string }
                  mlx_generate_model: { type: string }
                  mlx_available: { type: boolean }
                  mlx_url: { type: string }
                  mlx_model: { type: string }
                  mlx_dim: { type: integer }
                  embedding_count: { type: integer }
                  embedding_eligible_total: { type: integer }
                  embedding_backlog: { type: integer }
                  gen_stats:
                    type: object
                    properties:
                      summaries: { type: integer }
                      suggestions: { type: integer }
                      skills_created: { type: integer }
                      discoveries: { type: integer }
                  preferred:
                    type: object
                    additionalProperties: { type: [string, "null"] }
                  features:
                    type: object
                    properties:
                      auto_summarize: { type: boolean }
                      auto_embed: { type: boolean }
                      auto_conflict_resolve: { type: boolean }
                      semantic_search: { type: boolean }

  /ai/summarize:
    post:
      tags: [search]
      operationId: aiSummarize
      summary: MLX-generate summaries for entries (or unsummarized >24h old)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: integer }
      responses:
        '200':
          description: Summarized count
          content:
            application/json:
              schema:
                type: object
                properties:
                  summarized: { type: integer }
                  model: { type: string }
        '503':
          description: MLX generate unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── METRICS ─────────────────────────────────────────────────────
  /stats:
    get:
      tags: [metrics]
      operationId: stats
      summary: Database + entry statistics
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                type: object
                required: [entries, by_type, total_tokens, sessions]
                properties:
                  entries: { type: integer }
                  by_type:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string }
                        count: { type: integer }
                  oldest: { type: [string, "null"] }
                  newest: { type: [string, "null"] }
                  total_tokens: { type: integer }
                  sessions: { type: integer }
                  db_size_bytes: { type: integer }
                  db_size_human: { type: string }
                  warning: { type: [string, "null"] }
              examples:
                typical:
                  value:
                    entries: 152000
                    by_type:
                      - { type: tool-call, count: 98000 }
