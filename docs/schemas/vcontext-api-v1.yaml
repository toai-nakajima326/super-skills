  # ── EXPORT ──────────────────────────────────────────────────────
  /export:
    get:
      tags: [export]
      operationId: exportEntries
      summary: NDJSON dump of entries (owner only)
      description: |
        Streaming newline-delimited JSON. Line 1 is a meta header
        (`schema`, `excluded_types`, `generated_at`, `since_id`, ...).
        Lines 2..N are entries. Last line is `{ __trailer: true, ...}`.
        Secrets are masked via `maskSecrets()`. `include_sensitive=1`
        allows `api-key` / `credential` types (still masked).
      parameters:
        - in: query
          name: since
          schema: { type: integer, default: 0 }
          description: Only entries with id > this value
        - in: query
          name: limit
          schema: { type: integer, default: 500, maximum: 2000 }
          description: Per-batch page size
        - in: query
          name: max_entries
          schema: { type: integer, default: 50000, maximum: 500000 }
        - in: query
          name: include_sensitive
          schema: { type: string, enum: ["0", "1"], default: "0" }
      responses:
        '200':
          description: NDJSON stream
          headers:
            X-AIOS-Export-Version:
              schema: { type: string, default: "1" }
            Content-Disposition:
              schema: { type: string }
          content:
            application/x-ndjson:
              schema:
                type: string
                example: |
                  {"aios_export_version":1,"generated_at":"2026-04-20T00:00:00Z","schema":[...],"excluded_types":[...]}
                  {"id":1,"type":"decision","content":"...","tags":"[...]","session":"...","created_at":"..."}
                  {"__trailer":true,"written":12345,"last_id":99999,"batches":25}
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Not owner role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── AUTH ────────────────────────────────────────────────────────
  /auth/whoami:
    get:
      tags: [auth]
      operationId: whoami
      summary: Identity + role + groups of the caller
      security:
        - {}
        - bearerAuth: []
      responses:
        '200':
          description: Identity
          content:
            application/json:
              schema:
                type: object
                required: [userId, local, role, groups, host]
                properties:
                  userId: { type: string }
                  local: { type: boolean }
                  role: { $ref: '#/components/schemas/Role' }
                  groups:
                    type: array
                    items: { type: string }
                  host: { type: string }

  /auth/create-key:
    post:
      tags: [auth]
      operationId: createKey
      summary: Mint a new `vctx_<hex>` API key (admin+ required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, name]
              properties:
                userId: { type: string }
                name: { type: string }
                role: { $ref: '#/components/schemas/Role' }
                groups:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Key minted
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey: { type: string, pattern: '^vctx_[a-f0-9]{64}$' }
                  userId: { type: string }
                  name: { type: string }
                  role: { $ref: '#/components/schemas/Role' }
                  groups:
                    type: array
                    items: { type: string }
                  _setup: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /auth/update-key:
    post:
      tags: [auth]
